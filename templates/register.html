<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriFlow - Inscription</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { sauge: '#8A9A5B' }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#FAFAF8] text-stone-800 font-sans">

    <div class="min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8 selection:bg-sauge/20">
        <div class="sm:mx-auto sm:w-full sm:max-w-md flex flex-col items-center">
            <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-stone-800 to-stone-600 text-white flex items-center justify-center shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 14 6h5a2 2 0 0 1 2 2v5a7 7 0 0 1-14 0Z"/><path d="M11 20v-5"/><path d="M14 11a2 2 0 0 0-2 2"/></svg>
            </div>
            <h2 class="mt-6 text-center text-3xl font-light text-stone-800 tracking-tight">Créer un compte</h2>
            <p class="mt-2 text-center text-sm text-stone-500">Étape 1 sur 2</p>
        </div>

        <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
            <div class="bg-white py-8 px-4 shadow-[0_8px_30px_-4px_rgba(0,0,0,0.04)] sm:rounded-3xl sm:px-10 border border-stone-100 relative">
                
                <form class="space-y-6" action="dashboard.html" method="GET">
                    <div class="mb-8">
                        <h3 class="text-lg font-medium text-stone-800 mb-1">Informations personnelles</h3>
                        <p class="text-sm text-stone-500">Pour mieux vous connaître.</p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-stone-600 mb-2">Prénom</label>
                        <input required class="appearance-none block w-full px-4 py-3 border border-stone-200 rounded-xl shadow-sm focus:outline-none focus:ring-sauge focus:border-sauge sm:text-sm" placeholder="Jane" />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-stone-600 mb-2">Adresse e-mail</label>
                        <input type="email" required class="appearance-none block w-full px-4 py-3 border border-stone-200 rounded-xl shadow-sm focus:outline-none focus:ring-sauge focus:border-sauge sm:text-sm" placeholder="jane@exemple.com" />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-stone-600 mb-2">Genre</label>
                        <div class="grid grid-cols-2 gap-4">
                            <button type="button" class="py-3 rounded-xl border text-sm font-medium transition-colors bg-stone-800 text-white border-stone-800">Femme</button>
                            <button type="button" class="py-3 rounded-xl border text-sm font-medium transition-colors bg-white text-stone-600 border-stone-200 hover:bg-stone-50">Homme</button>
                        </div>
                    </div>

                    <div class="pt-4">
                        <button type="submit" class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-stone-800 hover:bg-stone-700 transition-colors">
                            Suivant 
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                        </button>
                    </div>
                </form>

                <div class="mt-8 text-center text-sm border-t border-stone-100 pt-6">
                    <span class="text-stone-500">Déjà un compte ? </span>
                    <a href="login.html" class="font-medium text-stone-800 hover:underline">Se connecter</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
